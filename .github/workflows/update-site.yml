name: Update SilvDocJobs

on:
  schedule:
    - cron: "25 12 * * 1,4"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-site:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper and site builder
        run: python main.py --log-level INFO

      - name: Commit updated site files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update SilvDocJobs data"
          file_pattern: docs/**
